<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="7EAt4FHGZn6Wov81TEyYwhuFmmD8NR1UyC6Peg3Y9x0" />
<title>Jan M Digital Growth — Graphics · Web · SEO</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;500;600;700&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-darker: #050505;
    --bg-card: #141414;
    --bg-card-hover: #1a1a1a;
    --fg: #f5f5f5;
    --fg-dim: #c0c0c0;
    --muted: #6a6a6a;
    --accent: #FF5400;
    --accent-bright: #FF7A33;
    --accent-dim: #B33A00;
    --accent-glow: rgba(255, 84, 0, 0.45);
    --silver: #C8C8C8;
    --silver-dim: #5a5a5a;
    --border: #1f1f1f;
    --border-light: #2a2a2a;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Archivo', sans-serif;
    overflow-x: hidden;
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }

  .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.005em; }
  .font-heading { font-family: 'Oswald', sans-serif; }
  .font-body { font-family: 'Archivo', sans-serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  .grain {
    position: fixed;
    inset: -10%;
    pointer-events: none;
    z-index: 200;
    opacity: 0.07;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='250' height='250'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    mix-blend-mode: overlay;
    will-change: transform;
  }

  .reveal {
    opacity: 0;
    transform: translateY(48px);
    transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1), transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
    transition-delay: var(--delay, 0s);
  }
  .reveal.in-view { opacity: 1; transform: translateY(0); }

  .reveal-stagger > * {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .reveal-stagger.in-view > * { opacity: 1; transform: translateY(0); }
  .reveal-stagger.in-view > *:nth-child(1) { transition-delay: 0s; }
  .reveal-stagger.in-view > *:nth-child(2) { transition-delay: 0.12s; }
  .reveal-stagger.in-view > *:nth-child(3) { transition-delay: 0.24s; }
  .reveal-stagger.in-view > *:nth-child(4) { transition-delay: 0.36s; }
  .reveal-stagger.in-view > *:nth-child(5) { transition-delay: 0.48s; }
  .reveal-stagger.in-view > *:nth-child(6) { transition-delay: 0.6s; }

  .reel-frame { position: absolute; inset: 0; opacity: 0; transition: opacity 2s ease-in-out; }
  .reel-frame.active { opacity: 1; }
  .reel-frame img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.55) brightness(0.38); transform: scale(1.06); }
  .reel-frame.active img { animation: kenburns 9s ease-out forwards; }
  @keyframes kenburns { 0% { transform: scale(1.06) translate(0,0); } 100% { transform: scale(1.18) translate(-2%,-2%); } }

  .hero-overlay {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(10,10,10,0.93) 0%, rgba(10,10,10,0.4) 30%, rgba(10,10,10,0.55) 65%, rgba(10,10,10,0.98) 100%),
      linear-gradient(90deg, rgba(10,10,10,0.88) 0%, rgba(10,10,10,0.15) 50%, rgba(10,10,10,0.55) 100%),
      radial-gradient(ellipse at 25% 60%, rgba(255,84,0,0.15) 0%, transparent 55%);
  }

  .flip-card { perspective: 1800px; height: 620px; }
  .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.9s cubic-bezier(0.4,0.2,0.2,1); transform-style: preserve-3d; }
  .flip-card:hover .flip-card-inner, .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
  .flip-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; overflow: hidden; }
  .flip-back { transform: rotateY(180deg); }

  @keyframes pulse-cta {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,84,0,0.6), 0 0 40px rgba(255,84,0,0.25); }
    50% { box-shadow: 0 0 0 16px rgba(255,84,0,0), 0 0 40px rgba(255,84,0,0.25); }
  }
  .pulse-btn { animation: pulse-cta 2.4s ease-out infinite; }

  .sticky-cta { position: fixed; bottom: 0; left: 0; right: 0; transform: translateY(110%); transition: transform 0.6s cubic-bezier(0.22,1,0.36,1); z-index: 90; }
  .sticky-cta.visible { transform: translateY(0); }

  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .marquee-track { display: flex; animation: marquee 40s linear infinite; width: max-content; }

  .story-track { display: flex; gap: 1.5rem; cursor: grab; user-select: none; will-change: transform; padding: 0 2rem; }
  .story-track.dragging { cursor: grabbing; }
  .story-track * { pointer-events: none; }
  .story-card { flex: 0 0 auto; width: 400px; background: var(--bg-card); border: 1px solid var(--border); transition: border-color 0.4s, transform 0.4s; }
  .story-card:hover { border-color: var(--accent); }

  .img-noir { filter: grayscale(100%) contrast(1.4) brightness(0.7); transition: filter 0.8s ease, transform 0.8s ease; }
  .text-stroke { -webkit-text-stroke: 1.5px var(--silver-dim); color: transparent; }
  .link-underline { position: relative; display: inline-block; }
  .link-underline::after { content: ''; position: absolute; left: 0; bottom: -3px; width: 0; height: 1px; background: var(--accent); transition: width 0.4s ease; }
  .link-underline:hover::after { width: 100%; }
  .number-display { font-variant-numeric: tabular-nums; }

  .form-input {
    background: transparent; border: none; border-bottom: 1px solid var(--border-light); color: var(--fg);
    padding: 0.85rem 0; font-family: 'Oswald', sans-serif; font-size: 1.15rem; width: 100%; transition: border-color 0.3s; letter-spacing: 0.04em;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.85rem; }

  .goal-pill {
    cursor: pointer; padding: 0.55rem 1.1rem; border: 1px solid var(--border-light); background: transparent;
    color: var(--fg-dim); font-family: 'Oswald', sans-serif; font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; transition: all 0.3s;
  }
  .goal-pill:hover { border-color: var(--silver-dim); color: var(--fg); }
  .goal-pill.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  @keyframes wave { 0%, 100% { height: 3px; } 50% { height: 16px; } }
  .wave-bar { display: inline-block; width: 2px; background: var(--accent); margin: 0 1.5px; height: 3px; vertical-align: bottom; }
  .unmuted .wave-bar { animation: wave 0.7s ease-in-out infinite; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; }

  .program-card { transition: transform 0.5s cubic-bezier(0.22,1,0.36,1); }
  .program-card:hover { transform: translateY(-8px); }
  .program-card .program-img { transition: transform 0.8s cubic-bezier(0.22,1,0.36,1), filter 0.8s; }
  .program-card:hover .program-img { transform: scale(1.08); filter: grayscale(80%) contrast(1.4) brightness(0.7); }

  .notch-corner { position: relative; }
  .notch-corner::before, .notch-corner::after { content: ''; position: absolute; width: 14px; height: 14px; border: 1px solid var(--accent); pointer-events: none; }
  .notch-corner::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .notch-corner::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  @keyframes rec-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .rec-dot { animation: rec-blink 1.5s ease-in-out infinite; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-darker); }
  ::-webkit-scrollbar-thumb { background: var(--accent-dim); }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .toast {
    position: fixed; top: 90px; right: 24px; background: var(--bg-card); border: 1px solid var(--accent);
    border-left: 3px solid var(--accent); padding: 1rem 1.5rem; z-index: 150;
    transform: translateX(120%); transition: transform 0.5s cubic-bezier(0.22,1,0.36,1); max-width: 360px;
  }
  .toast.visible { transform: translateX(0); }

  .headline-line { overflow: hidden; display: block; }
  .headline-line span { display: inline-block; transform: translateY(110%); transition: transform 1s cubic-bezier(0.22,1,0.36,1); }
  .in-view .headline-line span { transform: translateY(0); }
  .headline-line:nth-child(2) span { transition-delay: 0.1s; }
  .headline-line:nth-child(3) span { transition-delay: 0.2s; }

  .section-marker {
    display: inline-flex; align-items: center; gap: 0.75rem;
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase;
  }
  .section-marker::before { content: ''; width: 32px; height: 1px; background: var(--accent); }

  .coach-img-wrap { position: relative; height: 65%; overflow: hidden; }
  .coach-img-wrap img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.35) brightness(0.78); transition: filter 0.6s, transform 0.8s; }
  .flip-card:hover .coach-img-wrap img, .flip-card.flipped .coach-img-wrap img { filter: grayscale(70%) contrast(1.4) brightness(0.85); }

  .booking-frame {
    background: linear-gradient(135deg, rgba(255,84,0,0.04) 0%, transparent 50%, rgba(255,84,0,0.02) 100%);
    border: 1px solid var(--border); position: relative;
  }
  .booking-frame::before { content: ''; position: absolute; top: 0; left: 0; width: 60px; height: 60px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
  .booking-frame::after { content: ''; position: absolute; bottom: 0; right: 0; width: 60px; height: 60px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

  .scan-line {
    position: absolute; inset: 0; pointer-events: none; z-index: 2;
    background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
  }

  .bg-textured {
    background-color: var(--bg);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,84,0,0.05) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(80,80,80,0.05) 0%, transparent 40%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='r'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23r)' opacity='0.35'/></svg>");
    background-blend-mode: normal, normal, overlay;
  }

  .info-card { background: var(--bg-card); border: 1px solid var(--border); transition: border-color 0.4s, background 0.4s; }
  .info-card:hover { border-color: var(--accent-dim); background: var(--bg-card-hover); }

  .progress-bar { height: 1px; background: rgba(255,255,255,0.1); overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; }

  .nav-link {
    position: relative; font-family: 'Oswald', sans-serif; font-size: 0.85rem;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-dim); transition: color 0.3s;
  }
  .nav-link:hover { color: var(--fg); }
  .nav-link::before {
    content: ''; position: absolute; left: -14px; top: 50%; transform: translateY(-50%) scaleY(0);
    width: 4px; height: 4px; background: var(--accent); transition: transform 0.3s;
  }
  .nav-link:hover::before { transform: translateY(-50%) scaleY(1); }

  .mobile-menu {
    position: fixed; inset: 0; background: rgba(5,5,5,0.97); backdrop-filter: blur(20px); z-index: 100;
    display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 2rem;
    transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
  }
  .mobile-menu.open { transform: translateX(0); }
  .mobile-menu a { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 0.08em; color: var(--fg-dim); transition: color 0.3s; }
  .mobile-menu a:hover { color: var(--accent); }

  .process-connector { position: relative; }
  .process-connector::after {
    content: ''; position: absolute; top: 50%; right: -1.5rem; width: 3rem; height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  @media (max-width: 1023px) { .process-connector::after { display: none; } }

  /* About section image */
  .about-img-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }
  .about-img-grid img {
    width: 100%; height: 100%; object-fit: cover;
    filter: grayscale(100%) contrast(1.3) brightness(0.65);
    transition: filter 0.6s;
  }
  .about-img-grid:hover img { filter: grayscale(60%) contrast(1.35) brightness(0.75); }
  .about-img-grid .span-2 { grid-column: span 2; }

  /* Logo styling */
  .jm-logo {
    height: 38px;
    width: auto;
    filter: brightness(1.1);
    transition: filter 0.3s;
  }
  .jm-logo:hover { filter: brightness(1.3); }
  .jm-logo-footer {
    height: 44px;
    width: auto;
    filter: brightness(1.1);
  }
  .jm-logo-mobile {
    height: 30px;
    width: auto;
    filter: brightness(1.1);
  }

  /* Portfolio gallery grid */
  .portfolio-gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
  }
  .portfolio-gallery .pg-item {
    position: relative;
    overflow: hidden;
    aspect-ratio: 1;
  }
  .portfolio-gallery .pg-item.wide { grid-column: span 2; aspect-ratio: 2/1; }
  .portfolio-gallery .pg-item.tall { grid-row: span 2; aspect-ratio: 1/2; }
  .portfolio-gallery .pg-item img {
    width: 100%; height: 100%; object-fit: cover;
    filter: grayscale(100%) contrast(1.25) brightness(0.55);
    transition: filter 0.7s, transform 0.7s;
  }
  .portfolio-gallery .pg-item:hover img {
    filter: grayscale(40%) contrast(1.3) brightness(0.75);
    transform: scale(1.06);
  }
  .portfolio-gallery .pg-item .pg-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(10,10,10,0.85) 100%);
    display: flex; flex-direction: column; justify-content: flex-end; padding: 1rem;
    opacity: 0; transition: opacity 0.5s;
  }
  .portfolio-gallery .pg-item:hover .pg-overlay { opacity: 1; }

  @media (max-width: 768px) {
    .flip-card { height: 500px; }
    .story-card { width: 300px; }
    .portfolio-gallery { grid-template-columns: 1fr 1fr; }
    .portfolio-gallery .pg-item.wide { grid-column: span 2; }
    .portfolio-gallery .pg-item.tall { grid-row: span 1; aspect-ratio: 1; }
  }
</style>
</head>
